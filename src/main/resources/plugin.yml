name: IronFactory
version: ${project.version}
main: com.factory.generators.IronFactory
api-version: '1.20'
author: User
description: Generator Factory Plugin

softdepend:
  - PlaceholderAPI
  - DecentHolograms

commands:
  factory:
    description: Main factory command
    usage: /<command> <args>
    aliases: [f, gen, generator]
    permission: factory.use

  dbexport:
    description: Export generators and multiblock data
    usage: /<command> <generators|multiblock|all>
    aliases: [export]
    permission: factory.admin

  dbimport:
    description: Import generators and multiblock data
    usage: /<command> <filename> [merge|replace]
    aliases: [import]
    permission: factory.admin

  dbbackup:
    description: Create full data backup
    usage: /<command>
    aliases: [backup]
    permission: factory.admin

  dbrestore:
    description: Restore from latest backup
    usage: /<command> [generators|multiblock|all]
    aliases: [restore]
    permission: factory.admin

  dblist:
    description: List all available backups
    usage: /<command>
    aliases: [backuplist, listbackups]
    permission: factory.admin

  casino:
    description: Casino management commands
    usage: /<command> <create|remove|list|help>
    aliases: [cas]
    permission: factory.admin

permissions:
  factory.use:
    description: Use factory commands
    default: true
  factory.admin:
    description: Admin commands
    default: op
  factory.give:
    description: Give generators
    default: op
  factory.reload:
    description: Reload config
    default: op
  factory.bypass:
    description: Bypass limits
    default: op
