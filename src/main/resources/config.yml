settings:
  # Язык плагина
  language: ru
  
  # Максимум генераторов на игрока (0 = безлимит)
  max-generators-per-player: 50
  
  # Генераторы работают только когда владелец онлайн
  only-work-when-owner-online: false
  
  # Генераторы работают только в загруженных чанках
  only-work-in-loaded-chunks: true
  
  # НОВОЕ: Требуется ли быть рядом с генератором
  require-nearby-player: true

  # НОВОЕ: Максимальное расстояние от генератора (в блоках)
  nearby-player-distance: 5

  # Дроп генератора при разрушении
  drop-on-break: true

  # Только владелец может сломать генератор
  only-owner-can-break: true

  # Интервал автосохранения (в тиках, 6000 = 5 минут)
  auto-save-interval: 6000

# Настройки голограмм
hologram:
  # Использовать голограммы
  enabled: true

  # Интервал обновления (тики)
  update-interval: 20

# Настройки GUI
gui:
  # Размер инвентаря
  size: 27

  # Название меню
  title: '&8⚙ Генератор'

# Настройки системы апгрейдов
upgrades:
  # Включить систему апгрейдов
  enabled: true

  # Отображение инфо об апгрейдах в голограмме
  show-in-hologram: true

# Настройки казино
casino:
  # Включить казино
  enabled: true

  # Тип блока для казино
  casino-block: EMERALD_BLOCK

  # Шансы выигрыша (0.0-1.0)
  slot-machine-win-chance: 0.25       # 25% - выигрыш 3 одинаковых
  roulette-win-chance: 0.47           # 47% - красное или черное
  high-low-win-chance: 0.48           # 48% - выше или ниже 50

  # Множители выигрыша
  slot-machine-multiplier: 3.0        # x3 при 3 одинаковых
  roulette-multiplier: 1.8            # x1.8 при выигрыше
  high-low-multiplier: 1.9            # x1.9 при выигрыше

  # Допустимые размеры ставок
  bet-amounts:
    - 1
    - 5
    - 10
    - 50